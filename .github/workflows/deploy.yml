name: Deploy to GitHub Pages

# Static site (vendored Babylon + ES modules + assets) — no build step.
# On every push to main, publishes the SHIPPING allowlist (tools/make_dist.sh) to
# GitHub Pages — design sources, tools and never-loaded assets stay out
# (~120 MB of dead weight; see docs/DEPLOY.md).
# Live at: https://scottmatthews7.github.io/saurian/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build shipping artefact (runtime allowlist)
        run: bash tools/make_dist.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"
      - id: deployment
        uses: actions/deploy-pages@v4
