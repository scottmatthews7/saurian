<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>loading</title>
<!--
  DINO-LAB — end-to-end verify harness for procedural dinos skinned onto a
  Quaternius rig (see DINO_LAB.md). Loads a rigged glb, builds our procedural
  mesh, skins it onto the glb's OWN skeleton + clips (src/procmesh/glb-skin.mjs),
  and plays a clip so we can confirm the retarget animates cleanly.

  Query params:
    module  procedural module under src/procmesh/ (default velociraptor.js)
    glb     rigged asset, repo-relative          (default assets/models/raptor.glb)
    clip    clip-name substring                   (default Walk)
    palette colourway passed to buildCreature     (default chestnut)
    mode    ours | glb | both                     (default both)
    t       freeze at cycle fraction 0..1; omit to PLAY live (loop)
  When frozen (?t set) the title flips to READY for a screenshot driver.
-->
<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#8a8d90}
#c{width:100%;height:100%;display:block;outline:none}
#hud{position:fixed;left:10px;top:8px;font:13px/1.4 system-ui,monospace;color:#1a1a1a}
#err{position:fixed;left:10px;top:60px;font:12px monospace;color:#300;white-space:pre-wrap;max-width:92%}</style>
</head><body>
<canvas id="c"></canvas><div id="hud"></div><div id="err"></div>
<script src="../lib/babylon.js"></script>
<script src="../lib/babylonjs.loaders.min.js"></script>
<script type="module">
import { skinProceduralToRig } from "../src/procmesh/glb-skin.mjs";
const B = window.BABYLON;
const q = new URLSearchParams(location.search);
const modulePath = q.get("module") || "velociraptor.js";
const glbPath = q.get("glb") || "assets/models/raptor.glb";
const clipKey = q.get("clip") || "Walk";
const palette = q.get("palette") || "chestnut";
const mode = (q.get("mode") || "both").toLowerCase();
const tFrac = q.get("t") !== null && q.get("t") !== undefined && q.get("t") !== "" ? parseFloat(q.get("t")) : null;
const fail = (s, e) => { document.getElementById("err").textContent = `[${s}] ${e && e.stack || e}`; document.title = "ERROR"; window.__err = String(e && e.stack || e); };

const canvas = document.getElementById("c");
const engine = new B.Engine(canvas, true, { preserveDrawingBuffer: true });
const scene = new B.Scene(engine);
scene.clearColor = new B.Color4(0.54, 0.55, 0.57, 1);
const hemi = new B.HemisphericLight("h", new B.Vector3(0.1, 1, 0.1), scene); hemi.intensity = 0.7; hemi.groundColor = new B.Color3(0.34, 0.35, 0.37);
const key = new B.DirectionalLight("k", new B.Vector3(-0.55, -1, -0.45), scene); key.intensity = 1.3;
const cam = new B.ArcRotateCamera("cam", Math.PI, Math.PI / 2.15, 16, new B.Vector3(0, 1.3, 0), scene);
cam.attachControl(canvas, true); cam.wheelPrecision = 30; cam.minZ = 0.01; cam.maxZ = 2000;

// Load one rigged glb instance, normalise to ~2.4 m, optionally skin our mesh on.
const TARGET_H = 2.4;
const boundsH = (meshes) => {
  let mn = new B.Vector3(1e9, 1e9, 1e9), mx = new B.Vector3(-1e9, -1e9, -1e9);
  meshes.forEach((m) => { if (!m.getBoundingInfo || (m.getTotalVertices && !m.getTotalVertices())) return; m.computeWorldMatrix(true); const b = m.getBoundingInfo().boundingBox; mn = B.Vector3.Minimize(mn, b.minimumWorld); mx = B.Vector3.Maximize(mx, b.maximumWorld); });
  return Math.max(0.001, mx.y - mn.y);
};
async function makeInstance(useProc, xOffset) {
  const res = await B.SceneLoader.ImportMeshAsync("", "", "../" + glbPath, scene);
  const root = new B.TransformNode("inst_root", scene);
  res.meshes[0].parent = root;
  root.position.x = xOffset;
  if (useProc) {
    const mod = await import("../src/procmesh/" + modulePath);
    const procRoot = mod.buildCreature(scene, { palette });
    // Normalise by OUR mesh height (the visible one), not the glb's — our model
    // is built at its own unit scale, so glb-height would shrink it.
    const ourH = boundsH(procRoot.getChildMeshes());
    root.scaling.setAll(TARGET_H / ourH);
    const glbRenderable = res.meshes.filter((m) => m.getTotalVertices && m.getTotalVertices() > 0);
    skinProceduralToRig(scene, procRoot, { skeleton: res.skeletons[0], renderableMeshes: glbRenderable }, root);
    glbRenderable.forEach((m) => m.setEnabled(false));
    procRoot.dispose(true, false);
  } else {
    root.scaling.setAll(TARGET_H / boundsH(res.meshes));
  }
  // each instance keeps its OWN animationGroups; play the requested clip
  const groups = res.animationGroups;
  const grp = groups.find((g) => g.name.toLowerCase().includes(clipKey.toLowerCase())) || groups[0];
  if (grp) {
    if (tFrac !== null) { grp.play(true); const span = grp.to - grp.from; grp.goToFrame(grp.from + span * tFrac); grp.pause(); }
    else grp.play(true);
  }
  return { grp };
}

(async () => {
  try {
    const insts = [];
    if (mode === "ours" || mode === "both") insts.push(await makeInstance(true, mode === "both" ? -4.5 : 0));
    if (mode === "glb" || mode === "both") insts.push(await makeInstance(false, mode === "both" ? 4.5 : 0));
    document.getElementById("hud").textContent =
      `module=${modulePath}  glb=${glbPath}  clip=${insts[0] && insts[0].grp ? insts[0].grp.name : "?"}  mode=${mode}  ${mode === "both" ? "OURS (left)  vs  GLB (right)" : ""}`;
    if (tFrac !== null) { scene.render(); document.title = "READY"; }
    window.__ready = true;
  } catch (e) { fail("build", e); }
})();
engine.runRenderLoop(() => scene.render());
addEventListener("resize", () => engine.resize());
</script></body></html>
